<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まてぽけ14</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

    :root {
      --bg: #0d0f1a;
      --bg2: #141728;
      --bg3: #1c2035;
      --border: rgba(139, 165, 255, 0.15);
      --border2: rgba(139, 165, 255, 0.3);
      --accent: #8ba5ff;
      --accent2: #c4b5fd;
      --text: #e8ecff;
      --text2: #9aa3c8;
      --text3: #5a6280;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --gold: #f0c060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #app { min-height: 100vh; }

    header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .header-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.05em;
      flex: 1;
    }

    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 1.5rem;
      gap: 0;
    }

    .nav-btn {
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text3);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover { color: var(--text2); }
    .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page { display: none; }
    .page.active { display: block; }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border2), transparent);
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .character-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .character-card:hover { border-color: var(--border2); }
    .character-card.selected { border-color: var(--accent); background: rgba(139, 165, 255, 0.06); }

    .character-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .character-world { font-size: 0.75rem; color: var(--text3); }

    .character-count {
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 0.75rem;
    }

    .character-actions {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .character-card:hover .character-actions { opacity: 1; }

    .btn-icon {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg3);
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
    .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); }

    .btn-add-char {
      background: var(--bg2);
      border: 1px dashed var(--border2);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      color: var(--text3);
      font-size: 0.85rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-add-char:hover { border-color: var(--accent); color: var(--accent); }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 0.4rem;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text3); }
    select option { background: var(--bg3); }

    .btn-primary {
      padding: 0.6rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0d0f1a;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-secondary {
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text2);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-row { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 1.75rem;
      width: 400px;
      max-width: 90vw;
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }

    .material-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .char-select-label {
      font-size: 0.85rem;
      color: var(--text2);
      white-space: nowrap;
    }

    .material-table {
      width: 100%;
      border-collapse: collapse;
    }

    .material-table th {
      font-size: 0.75rem;
      color: var(--text3);
      font-weight: 400;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .material-table td {
      padding: 0.6rem 0.75rem;
      font-size: 0.875rem;
      border-bottom: 1px solid rgba(139, 165, 255, 0.06);
    }

    .material-table tr:hover td { background: rgba(139, 165, 255, 0.04); }

    .qty-input {
      width: 80px;
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
    }

    .btn-del {
      padding: 0.25rem 0.5rem;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text3);
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .btn-del:hover { border-color: var(--danger); color: var(--danger); }

    .overview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .overview-table th {
      font-size: 0.75rem;
      color: var(--text3);
      font-weight: 400;
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .overview-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid rgba(139, 165, 255, 0.06);
    }

    .overview-table tr:hover td { background: rgba(139, 165, 255, 0.04); }

    .search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .recipe-pane-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .recipe-pane-left {
      width: 280px;
      flex-shrink: 0;
    }

    .recipe-pane-right {
      flex: 1;
      min-width: 0;
    }

    .recipe-list-item {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text2);
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .recipe-list-item:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .recipe-list-item.selected {
      background: rgba(139, 165, 255, 0.1);
      border-color: var(--border2);
      color: var(--accent);
    }

    .search-bar input { flex: 1; }

    .recipe-result { margin-top: 1.5rem; }

    .recipe-name {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .ingredient-row {
      display: flex;
      align-items: center;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .ingredient-name { flex: 1; font-size: 0.9rem; }
    .ingredient-need { font-size: 0.85rem; color: var(--text2); white-space: nowrap; }

    .status-ok { color: var(--success); font-size: 0.8rem; }
    .status-ng { color: var(--danger); font-size: 0.8rem; }
    .status-warn { color: var(--warning); font-size: 0.8rem; }

    .char-breakdown {
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--bg3);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text2);
    }

    .char-breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-top: 1px solid var(--border);
      margin-top: 0.25rem;
      font-weight: 500;
      color: var(--text);
    }

    .loading {
      text-align: center;
      color: var(--text3);
      font-size: 0.85rem;
      padding: 2rem;
    }

    .empty {
      text-align: center;
      color: var(--text3);
      font-size: 0.85rem;
      padding: 3rem;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s;
      z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-logo">まてぽけ１４</div>
  </header>

  <nav>
    <button class="nav-btn active" onclick="showPage('characters', this)">キャラクター</button>
    <button class="nav-btn" onclick="showPage('materials', this)">素材管理</button>
    <button class="nav-btn" onclick="showPage('overview', this)">素材一覧</button>
    <button class="nav-btn" onclick="showPage('recipe', this)">レシピ検索</button>
  </nav>

  <main>
    <div id="page-characters" class="page active">
      <div class="section-title">キャラクター管理</div>
      <div class="character-grid" id="character-grid"></div>
    </div>

    <div id="page-materials" class="page">
      <div class="section-title">素材管理</div>
      <div class="material-header">
        <span class="char-select-label">キャラクター：</span>
        <select id="mat-char-select" onchange="loadMaterials()" style="width:200px"></select>
        <button class="btn-primary" onclick="openAddMaterial()" style="margin-left:auto">＋ 素材追加</button>
      </div>
      <div class="card">
        <table class="material-table">
          <thead>
            <tr>
              <th>アイテム名</th>
              <th>個数</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="material-tbody">
            <tr><td colspan="3" class="loading">キャラクターを選択してください</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="page-overview" class="page">
      <div class="section-title">素材横断一覧</div>
      <div class="card">
        <table class="overview-table" id="overview-table">
          <thead>
            <tr id="overview-header">
              <th>アイテム名</th>
              <th>合計</th>
            </tr>
          </thead>
          <tbody id="overview-tbody">
            <tr><td colspan="2" class="loading">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

   <div id="page-recipe" class="page">
      <div class="section-title">レシピ検索</div>
      <div class="recipe-pane-layout">
        <div class="recipe-pane-left">
          <div class="search-bar">
            <input type="text" id="recipe-input" placeholder="アイテム名で検索（例：ハイポーション）" onkeydown="if(event.key==='Enter')searchRecipe()" />
            <button class="btn-primary" onclick="searchRecipe()">検索</button>
          </div>
          <div id="recipe-list"></div>
        </div>
        <div class="recipe-pane-right">
          <div id="recipe-char-row" style="display:none; margin-bottom:1rem; display:none; align-items:center; gap:0.75rem;">
            <span class="char-select-label">判定キャラクター：</span>
            <select id="recipe-char-select" style="width:200px" onchange="reRenderRecipe()">
              <option value="all">全キャラ合算</option>
            </select>
          </div>
          <div id="recipe-result"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- キャラクター追加/編集モーダル -->
<div class="modal-overlay" id="modal-char">
  <div class="modal">
    <div class="modal-title" id="modal-char-title">キャラクター追加</div>
    <input type="hidden" id="edit-char-id" />
    <div class="form-group">
      <label>キャラクター名</label>
      <input type="text" id="char-name-input" placeholder="光の戦士" />
    </div>
    <div class="form-group">
      <label>ワールド名</label>
      <select id="char-world-input">
        <option value="">未選択</option>
        <optgroup label="Elemental">
          <option>Aegis</option><option>Atomos</option><option>Carbuncle</option>
          <option>Garuda</option><option>Gungnir</option><option>Kujata</option>
          <option>Tonberry</option><option>Typhon</option>
        </optgroup>
        <optgroup label="Gaia">
          <option>Alexander</option><option>Bahamut</option><option>Durandal</option>
          <option>Fenrir</option><option>Ifrit</option><option>Ridill</option>
          <option>Tiamat</option><option>Ultima</option>
        </optgroup>
        <optgroup label="Mana">
          <option>Anima</option><option>Asura</option><option>Chocobo</option>
          <option>Hades</option><option>Ixion</option><option>Masamune</option>
          <option>Pandaemonium</option><option>Titan</option>
        </optgroup>
        <optgroup label="Meteor">
          <option>Belias</option><option>Mandragora</option><option>Ramuh</option>
          <option>Shinryu</option><option>Unicorn</option><option>Valefor</option>
          <option>Yojimbo</option><option>Zeromus</option>
        </optgroup>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('modal-char')">キャンセル</button>
      <button class="btn-primary" onclick="saveCharacter()">保存</button>
    </div>
  </div>
</div>

<!-- 素材追加モーダル -->
<div class="modal-overlay" id="modal-material">
  <div class="modal">
    <div class="modal-title">素材追加</div>
    <div class="form-group">
      <label>アイテム名</label>
      <input type="text" id="mat-name-input" placeholder="ハイポーション" />
    </div>
    <div class="form-group">
      <label>個数</label>
      <input type="number" id="mat-qty-input" min="0" value="1" />
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('modal-material')">キャンセル</button>
      <button class="btn-primary" onclick="saveMaterial()">追加</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ===== localStorage操作 =====
  const STORAGE_KEY = 'ff14_material_manager';

  function loadStorage() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { characters: [] };
    } catch(e) {
      return { characters: [] };
    }
  }

  function saveStorage(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ===== 状態 =====
  let characters = [];
  let lastRecipeData = null;

  function init() {
    const data = loadStorage();
    characters = (data.characters || []).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    renderCharacters();
    updateCharSelects();
  }

  // ===== キャラクター =====
  function renderCharacters() {
    const grid = document.getElementById('character-grid');
    let html = '';
    characters.forEach(c => {
      const matCount = (c.materials || []).length;
      html += `
        <div class="character-card" id="ccard-${c.id}">
          <div class="character-actions">
            <button class="btn-icon edit" onclick="openEditChar('${c.id}',event)" title="編集">✎</button>
            <button class="btn-icon" onclick="deleteChar('${c.id}',event)" title="削除">✕</button>
          </div>
          <div class="character-name">${escHtml(c.name)}</div>
          <div class="character-world">${escHtml(c.world || '')}</div>
          <div class="character-count">${matCount} 種類の素材</div>
        </div>`;
    });
    html += `<button class="btn-add-char" onclick="openAddChar()">＋ キャラクター追加</button>`;
    grid.innerHTML = html;
  }

  function updateCharSelects() {
    const matSel = document.getElementById('mat-char-select');
    const recSel = document.getElementById('recipe-char-select');
    const cur = matSel.value;
    matSel.innerHTML = characters.length === 0
      ? '<option value="">キャラクターがいません</option>'
      : characters.map(c => `<option value="${c.id}">${escHtml(c.name)}${c.world ? ` (${escHtml(c.world)})` : ''}</option>`).join('');
    if (cur && characters.find(c => c.id === cur)) matSel.value = cur;

    recSel.innerHTML = '<option value="all">全キャラ合算</option>' +
      characters.map(c => `<option value="${c.id}">${escHtml(c.name)}${c.world ? ` (${escHtml(c.world)})` : ''}</option>`).join('');
  }

  window.openAddChar = () => {
    document.getElementById('modal-char-title').textContent = 'キャラクター追加';
    document.getElementById('edit-char-id').value = '';
    document.getElementById('char-name-input').value = '';
    document.getElementById('char-world-input').value = '';
    openModal('modal-char');
  };

  window.openEditChar = (id, e) => {
    e && e.stopPropagation();
    const c = characters.find(x => x.id === id);
    if (!c) return;
    document.getElementById('modal-char-title').textContent = 'キャラクター編集';
    document.getElementById('edit-char-id').value = id;
    document.getElementById('char-name-input').value = c.name;
    document.getElementById('char-world-input').value = c.world || '';
    openModal('modal-char');
  };

  window.saveCharacter = () => {
    const name = document.getElementById('char-name-input').value.trim();
    const world = document.getElementById('char-world-input').value.trim();
    if (!name) { showToast('名前を入力してください'); return; }
    const editId = document.getElementById('edit-char-id').value;
    const data = loadStorage();

    if (editId) {
      const idx = data.characters.findIndex(c => c.id === editId);
      if (idx !== -1) {
        data.characters[idx].name = name;
        data.characters[idx].world = world;
      }
      showToast('更新しました');
    } else {
      data.characters.push({
        id: 'c_' + Date.now(),
        name,
        world,
        materials: [],
        createdAt: Date.now()
      });
      showToast('追加しました');
    }

    saveStorage(data);
    closeModal('modal-char');
    init();
  };

  window.deleteChar = (id, e) => {
    e && e.stopPropagation();
    if (!confirm('このキャラクターを削除しますか？\n（素材データも削除されます）')) return;
    const data = loadStorage();
    data.characters = data.characters.filter(c => c.id !== id);
    saveStorage(data);
    showToast('削除しました');
    init();
  };

  // ===== 素材管理 =====
  window.loadMaterials = () => {
    const charId = document.getElementById('mat-char-select').value;
    if (!charId) return;
    const data = loadStorage();
    const char = data.characters.find(c => c.id === charId);
    const mats = char ? (char.materials || []) : [];
    const tbody = document.getElementById('material-tbody');

    if (mats.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">素材がありません</td></tr>';
      return;
    }

    tbody.innerHTML = [...mats].sort((a, b) => a.name.localeCompare(b.name, 'ja')).map(m => `
      <tr>
        <td>${escHtml(m.name)}</td>
        <td><input class="qty-input" type="number" min="0" value="${m.quantity}" onchange="updateQty('${charId}','${m.id}',this.value)" /></td>
        <td><button class="btn-del" onclick="deleteMat('${charId}','${m.id}')">削除</button></td>
      </tr>`).join('');
  };

  window.openAddMaterial = () => {
    if (!document.getElementById('mat-char-select').value) {
      showToast('キャラクターを選択してください'); return;
    }
    document.getElementById('mat-name-input').value = '';
    document.getElementById('mat-qty-input').value = '1';
    openModal('modal-material');
  };

  window.saveMaterial = () => {
    const charId = document.getElementById('mat-char-select').value;
    const name = document.getElementById('mat-name-input').value.trim();
    const qty = parseInt(document.getElementById('mat-qty-input').value) || 0;
    if (!name) { showToast('アイテム名を入力してください'); return; }

    const data = loadStorage();
    const char = data.characters.find(c => c.id === charId);
    if (!char) return;
    if (!char.materials) char.materials = [];

    const existing = char.materials.find(m => m.name === name);
    if (existing) {
      existing.quantity += qty;
      showToast(`${name} の個数を更新しました`);
    } else {
      char.materials.push({ id: 'm_' + Date.now(), name, quantity: qty });
      showToast('追加しました');
    }

    saveStorage(data);
    closeModal('modal-material');
    loadMaterials();
  };

  window.updateQty = (charId, matId, val) => {
    const qty = parseInt(val) || 0;
    const data = loadStorage();
    const char = data.characters.find(c => c.id === charId);
    if (!char) return;
    const mat = (char.materials || []).find(m => m.id === matId);
    if (mat) mat.quantity = qty;
    saveStorage(data);
    showToast('更新しました');
  };

  window.deleteMat = (charId, matId) => {
    if (!confirm('この素材を削除しますか？')) return;
    const data = loadStorage();
    const char = data.characters.find(c => c.id === charId);
    if (!char) return;
    char.materials = (char.materials || []).filter(m => m.id !== matId);
    saveStorage(data);
    showToast('削除しました');
    loadMaterials();
  };

  // ===== 素材横断一覧 =====
  window.loadOverview = () => {
    const thead = document.getElementById('overview-header');
    const tbody = document.getElementById('overview-tbody');
    if (characters.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">キャラクターがいません</td></tr>';
      return;
    }

    const data = loadStorage();
    const allData = {};
    for (const c of data.characters) {
      for (const m of (c.materials || [])) {
        if (!allData[m.name]) allData[m.name] = { total: 0, chars: {} };
        allData[m.name].total += m.quantity;
        allData[m.name].chars[c.id] = m.quantity;
      }
    }

    const items = Object.entries(allData).sort((a, b) => a[0].localeCompare(b[0], 'ja'));
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">素材が登録されていません</td></tr>';
      return;
    }

    thead.innerHTML = `<th>アイテム名</th>${characters.map(c => `<th>${escHtml(c.name)}</th>`).join('')}<th>合計</th>`;
    tbody.innerHTML = items.map(([name, d]) =>
      `<tr>
        <td>${escHtml(name)}</td>
        ${characters.map(c => `<td style="color:var(--text2)">${d.chars[c.id] ?? '—'}</td>`).join('')}
        <td style="font-weight:500;color:var(--accent)">${d.total}</td>
      </tr>`
    ).join('');
  };

  // ===== レシピ検索 =====
  let searchResults = [];

  window.searchRecipe = async () => {
    const query = document.getElementById('recipe-input').value.trim();
    if (!query) return;
    const listDiv = document.getElementById('recipe-list');
    const resultDiv = document.getElementById('recipe-result');
    listDiv.innerHTML = '<div class="loading">検索中...</div>';
    resultDiv.innerHTML = '';
    document.getElementById('recipe-char-row').style.display = 'none';
    lastRecipeData = null;
    searchResults = [];

    try {
      const searchUrl = new URL('https://v2.xivapi.com/api/search');
      searchUrl.searchParams.set('sheets', 'Recipe');
      searchUrl.searchParams.set('query', `ItemResult.Name@ja~"${query}"`);
      searchUrl.searchParams.set('language', 'ja');
      searchUrl.searchParams.set('limit', '10');
      const searchRes = await fetch(searchUrl.toString());
      const searchData = await searchRes.json();
      if (!searchData.results || searchData.results.length === 0) {
        listDiv.innerHTML = '<div class="empty">レシピが見つかりませんでした</div>';
        return;
      }

      searchResults = searchData.results.map(r => ({
        row_id: r.row_id,
        name: r.fields?.ItemResult?.fields?.Name || r.fields?.ItemResult?.value?.toString() || `ID:${r.row_id}`
      }));

      renderSearchList(null);
    } catch(e) {
      listDiv.innerHTML = '<div class="empty">検索中にエラーが発生しました</div>';
      console.error(e);
    }
  };

  function renderSearchList(selectedRowId) {
    const listDiv = document.getElementById('recipe-list');
    listDiv.innerHTML = searchResults.map(r =>
      `<div class="recipe-list-item${r.row_id === selectedRowId ? ' selected' : ''}" onclick="selectRecipe(${r.row_id})">${escHtml(r.name)}</div>`
    ).join('');
  }

  window.selectRecipe = async (rowId) => {
    renderSearchList(rowId);
    const resultDiv = document.getElementById('recipe-result');
    resultDiv.innerHTML = '<div class="loading">読み込み中...</div>';
    document.getElementById('recipe-char-row').style.display = 'none';

    try {
      const detailRes = await fetch(`https://v2.xivapi.com/api/sheet/Recipe/${rowId}?language=ja`);
      const detail = await detailRes.json();
      const f = detail.fields;

      const ingredients = [];
      const ingredientArr = f?.Ingredient || [];
      const amountArr = f?.AmountIngredient || [];
      for (let i = 0; i < ingredientArr.length; i++) {
        const amount = amountArr[i] ?? 0;
        if (amount <= 0) continue;
        const itemName = ingredientArr[i]?.fields?.Name
          || ingredientArr[i]?.value?.toString()
          || `素材[${i}]`;
        ingredients.push({ name: itemName, need: amount });
      }

      const recipeName = f?.ItemResult?.fields?.Name
        || f?.ItemResult?.value?.toString()
        || `ID:${rowId}`;

      lastRecipeData = { name: recipeName, ingredients, amount: f?.AmountResult || 1 };
      document.getElementById('recipe-char-row').style.display = 'flex';
      renderRecipeResult();
    } catch(e) {
      resultDiv.innerHTML = '<div class="empty">読み込み中にエラーが発生しました</div>';
      console.error(e);
    }
  };

  window.reRenderRecipe = () => {
    if (lastRecipeData) renderRecipeResult();
  };

  function renderRecipeResult() {
    if (!lastRecipeData) return;
    const { name, ingredients, amount } = lastRecipeData;
    const selectedChar = document.getElementById('recipe-char-select').value;
    const resultDiv = document.getElementById('recipe-result');
    const data = loadStorage();

    const possession = {};
    for (const c of data.characters) {
      possession[c.id] = {};
      for (const m of (c.materials || [])) {
        possession[c.id][m.name] = m.quantity;
      }
    }

    let html = `
      <div class="card recipe-result">
        <div class="recipe-name">${escHtml(name)} × ${amount}</div>`;

    ingredients.forEach(ing => {
      const totalHave = characters.reduce((sum, c) => sum + (possession[c.id]?.[ing.name] || 0), 0);
      const selectedHave = selectedChar === 'all'
        ? totalHave
        : (possession[selectedChar]?.[ing.name] || 0);
      const enough = selectedHave >= ing.need;
      const totalEnough = totalHave >= ing.need;

      let statusLabel = '';
      let statusClass = '';
      if (selectedChar === 'all') {
        if (totalEnough) { statusLabel = '✓ 足りる'; statusClass = 'status-ok'; }
        else { statusLabel = `✗ ${ing.need - totalHave}個不足`; statusClass = 'status-ng'; }
      } else {
        if (enough) { statusLabel = '✓ 足りる'; statusClass = 'status-ok'; }
        else if (totalEnough) { statusLabel = '△ 合算で足りる'; statusClass = 'status-warn'; }
        else { statusLabel = `✗ ${ing.need - totalHave}個不足`; statusClass = 'status-ng'; }
      }

      const breakdownChars = selectedChar === 'all' ? characters : characters.filter(c => c.id === selectedChar);

      html += `
        <div class="ingredient-row">
          <div class="ingredient-name">${escHtml(ing.name)}</div>
          <div class="ingredient-need">必要: ${ing.need}</div>
          <div class="${statusClass}" style="min-width:120px;text-align:right">${statusLabel}</div>
        </div>
        <div class="char-breakdown">
          ${breakdownChars.map(c => {
            const have = possession[c.id]?.[ing.name] || 0;
            const displayName = c.world ? `${escHtml(c.name)}(${escHtml(c.world)})` : escHtml(c.name);
            return `<div class="char-breakdown-row">
              <span style="color:var(--text3)">${displayName}</span>
              <span style="color:${have > 0 ? 'var(--text)' : 'var(--text3)'}">${have}個</span>
            </div>`;
          }).join('')}
          ${selectedChar === 'all' ? `
          <div class="total-row">
            <span>合計</span>
            <span style="color:${totalEnough ? 'var(--success)' : 'var(--danger)'}">${totalHave}個</span>
          </div>` : ''}
        </div>`;
    });

    html += `</div>`;
    resultDiv.innerHTML = html;
  }

  // ===== ユーティリティ =====
  window.showPage = (page, btn) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    btn.classList.add('active');
    if (page === 'materials') loadMaterials();
    if (page === 'overview') loadOverview();
  };

  window.openModal = id => document.getElementById(id).classList.add('open');
  window.closeModal = id => document.getElementById(id).classList.remove('open');

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== 起動 =====
  init();
</script>
</body>
</html>
